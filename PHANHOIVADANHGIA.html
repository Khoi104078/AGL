<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đánh giá sự kiện</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
}

/* hoa rơi */
.flower {
    position: fixed;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    padding: 40px;
    text-align: center;
}

.box {
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 15px;
    width: 500px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(255,105,180,0.4);
}

input, textarea, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ffb6c1;
}

button {
    background: #ff4d88;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #e6005c;
}

.review {
    background: #fff0f5;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    text-align: left;
}

h2 {
    color: #ff4d88;
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 30; i++) {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "🌸";
    f.style.left = Math.random()*100 + "vw";
    f.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(f);
}
</script>

<div class="container">
<div class="box">

<h2>📝 Đánh giá sự kiện</h2>

<input type="text" id="email" placeholder="Nhập email của bạn">
<input type="number" id="rating" placeholder="Điểm (1-5)">
<textarea id="comment" placeholder="Nhận xét..."></textarea>

<button onclick="guiDanhGia()">Gửi đánh giá</button>

<p id="thongbao"></p>

<hr>

<h3>📊 Phản hồi từ người tham gia</h3>
<div id="danhsach"></div>

</div>
</div>

<script>
// =======================
// DỮ LIỆU GIẢ LẬP
// =======================

// thời gian kết thúc sự kiện (có thể đổi)
let eventEndTime = new Date("2026-04-05T20:00:00");

// danh sách check-in (giả lập)
let checkInList = JSON.parse(localStorage.getItem("checkin")) || [
    "a@gmail.com",
    "b@gmail.com"
];

// danh sách đánh giá
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

// =======================
// HÀM GỬI ĐÁNH GIÁ
// =======================
function guiDanhGia() {
    let email = document.getElementById("email").value.trim();
    let rating = document.getElementById("rating").value;
    let comment = document.getElementById("comment").value.trim();
    let thongbao = document.getElementById("thongbao");

    thongbao.innerText = "";

    // 1. kiểm tra thời gian
    let now = new Date();
    if (now < eventEndTime) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Chưa thể đánh giá khi sự kiện chưa kết thúc!";
        return;
    }

    // 2. kiểm tra check-in
    if (!checkInList.includes(email)) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Bạn chưa check-in nên không thể đánh giá!";
        return;
    }

    // 3. validate
    if (!email || !rating || !comment) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Vui lòng nhập đầy đủ thông tin!";
        return;
    }

    if (rating < 1 || rating > 5) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Điểm phải từ 1 đến 5!";
        return;
    }

    // 4. lưu đánh giá
    let review = { email, rating, comment };
    reviews.push(review);
    localStorage.setItem("reviews", JSON.stringify(reviews));

    thongbao.style.color = "green";
    thongbao.innerText = "🎉 Gửi đánh giá thành công!";

    hienThiDanhGia();
}

// =======================
// HIỂN THỊ ĐÁNH GIÁ
// =======================
function hienThiDanhGia() {
    let box = document.getElementById("danhsach");
    box.innerHTML = "";

    reviews.forEach(r => {
        box.innerHTML += `
            <div class="review">
                📧 ${r.email}<br>
                ⭐ ${r.rating}/5<br>
                💬 ${r.comment}
            </div>
        `;
    });
}

// load khi mở trang
hienThiDanhGia();
</script>

</body>
</html>
