<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sự kiện CLB</title>
    <link rel="stylesheet" href="giaodien.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Cấu trúc Layout cố định Sidebar */
        body { display: flex; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Sidebar giữ nguyên từ ảnh giao diện chính */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #ff8fab, #ff6a88);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            flex-shrink: 0;
            z-index: 1000;
        }

        .sidebar button {
            background: white;
            color: #ff6a88;
            border: none;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .sidebar button:hover { background: #fff0f3; }
        .sidebar button.active { background: #ffe0ea; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }

        /* Vùng nội dung bên phải có thanh Top Bar cố định */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg,#ff9a9e,#fad0c4);
            overflow-y: auto;
        }

        .top-bar {
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 25px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .search-container {
            background: #fdf2f4;
            border: 1px solid #ffe0ea;
            padding: 8px 20px;
            border-radius: 25px;
            width: 500px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container input {
            border: none; background: none; outline: none; width: 100%; padding: 0;
        }

        /* Ghi đè class .page để phù hợp với layout mới */
        .page { padding: 40px 20px; width: 100%; }
    </style>
</head>
<body>

    <aside class="sidebar" id="mainSidebar">
        <div style="color: white; font-size: 24px; margin-bottom: 25px; padding-left: 10px;">
            <i class="fas fa-bars"></i>
        </div>
        <button onclick="goHome()" id="btnHome"><i class="fas fa-home"></i> Trang chủ</button>
        <button><i class="fas fa-plus"></i> Tạo sự kiện</button>
        <button><i class="fas fa-wallet"></i> Quản lý ngân sách</button>
        <button><i class="fas fa-calendar-alt"></i> Quản lý sự kiện</button>
        <button onclick="showPage('listPage')" id="btnAssign"><i class="fas fa-user-tag"></i> Phân chia vai trò</button>
        <button><i class="fas fa-users"></i> Người tham gia</button>
        <button><i class="fas fa-search-plus"></i> Quản lý chi tiết</button>
        <button><i class="fas fa-hand-holding-heart"></i> Tham gia</button>
        <button><i class="fas fa-lock"></i> Đăng nhập / Đăng ký</button>
        <button style="margin-top: auto; background: rgba(255,255,255,0.3); color: white;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
    </aside>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="search-container">
                <i class="fas fa-search" style="color: #ff8fab;"></i>
                <input type="text" placeholder="Tìm kiếm: trang, sự kiện, người tham gia...">
            </div>
        </div>

        <main id="homePage" class="page" style="display: block;">
            <div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
                <div class="card" style="text-align: center; padding: 50px; border-radius: 30px;">
                    <h2 style="color: #ff6a88;"><i class="fas fa-flower"></i> Quản lý sự kiện CLB <i class="fas fa-flower"></i></h2>
                    <p style="margin: 20px 0; font-size: 18px; color: #c0395e;">Xin chào <b>Minh Khôi (admin)</b></p>
                    <p style="color: #999;">Hệ thống quản lý sự kiện dành cho thành viên CLB.</p>
                </div>
            </div>
        </main>

        <main id="listPage" class="page" style="display: none;">
            <div class="card" style="max-width: 900px;">
                <div style="margin-bottom: 20px;">
                    <button onclick="goHome()" style="background: #fff0f3; border: 1px solid #ff6a88; color: #ff6a88; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold;">
                        <i class="fas fa-arrow-left"></i> Quay lại Trang chủ
                    </button>
                </div>

                <h2>Phụ trách nhiệm vụ sự kiện</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Thành viên</th>
                            <th>Phụ trách công việc</th>
                            <th>Hạn hoàn thành</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="assignmentTable"></tbody>
                </table>
                <button class="main" style="margin-top: 25px;" onclick="showPage('formPage')">
                    <i class="fas fa-plus"></i> Thêm phân công mới
                </button>
            </div>
        </main>

        <main id="formPage" class="page" style="display: none;">
            <div class="card">
                <button onclick="showPage('listPage')" style="background: none; border: none; color: #ff6a88; cursor: pointer; margin-bottom: 15px;">
                    <i class="fas fa-chevron-left"></i> Quay lại danh sách
                </button>
                <h2>Phân chia nhiệm vụ</h2>
                <div class="form-group">
                    <label>Tên thành viên</label>
                    <input type="text" id="memberName">
                </div>
                <div class="form-group">
                    <label>Công việc phụ trách</label>
                    <select id="taskWork">
                        <option value="Hậu cần">Hậu cần</option>
                        <option value="Kỹ thuật">Kỹ thuật</option>
                        <option value="Truyền thông">Truyền thông</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Hạn hoàn thành</label>
                    <input type="date" id="taskDeadline">
                </div>
                <button class="main" onclick="saveData()">Lưu thông tin</button>
            </div>
        </main>
    </div>

    <div id="flowerContainer"></div>
    <div id="toast" class="toast"></div>

    <script>
        let tasks = [{name: "Minh Khôi", work: "Quản lý chung", deadline: "2026-12-31"}];

        // Hàm chuyển trang mà không làm mất Menu
        function showPage(pageId) {
            // Ẩn tất cả main nội dung
            document.querySelectorAll('main.page').forEach(p => p.style.display = 'none');
            // Hiện trang được chọn
            document.getElementById(pageId).style.display = 'block';

            // Cập nhật trạng thái Active trên Sidebar
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
            if(pageId === 'homePage') document.getElementById('btnHome').classList.add('active');
            if(pageId === 'listPage' || pageId === 'formPage') document.getElementById('btnAssign').classList.add('active');
        }

        // Quay lại giao diện chính (Trang Dashboard)
        function goHome() {
            showPage('homePage');
        }

        function renderTable() {
            const tbody = document.getElementById('assignmentTable');
            tbody.innerHTML = tasks.map((t, i) => `
                <tr>
                    <td><b>${t.name}</b></td>
                    <td><span class="status-tag active">${t.work}</span></td>
                    <td>${t.deadline}</td>
                    <td>
                        <i class="fas fa-trash" onclick="deleteTask(${i})" style="color:#e74c3c; cursor:pointer;"></i>
                    </td>
                </tr>
            `).join('');
        }

        function saveData() {
            const name = document.getElementById('memberName').value;
            const work = document.getElementById('taskWork').value;
            const deadline = document.getElementById('taskDeadline').value;
            if(!name || !deadline) return alert("Vui lòng nhập đủ!");
            
            tasks.push({name, work, deadline});
            renderTable();
            showPage('listPage');
        }

        function deleteTask(i) {
            tasks.splice(i, 1);
            renderTable();
        }

        // Hiệu ứng hoa rơi
        function createFlowers() {
            const container = document.getElementById('flowerContainer');
            setInterval(() => {
                const f = document.createElement('div');
                f.className = 'flower'; f.innerText = '🌸';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(f);
                setTimeout(() => f.remove(), 5000);
            }, 1000);
        }

        renderTable();
        createFlowers();
        goHome(); // Khởi tạo ở trang chủ
    </script>
</body>
</html>
