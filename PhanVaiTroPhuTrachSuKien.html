<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Phân công Sự kiện</title>
    <link rel="stylesheet" href="giaodien.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <nav class="menu" id="sideMenu">
        <button onclick="showPage('listPage')"><i class="fas fa-users"></i> Danh sách phân công</button>
        <button onclick="showPage('assignPage')" id="adminBtn"><i class="fas fa-user-plus"></i> Gán vai trò (Admin)</button>
        <button onclick="toggleAdmin()"><i class="fas fa-shield-alt"></i> Chế độ: <span id="roleStatus">User</span></button>
    </nav>

    <main id="listPage" class="page" style="display: block;">
        <div class="card" style="max-width: 800px;">
            <h2><i class="fas fa-clipboard-list"></i> Danh sách Phân công</h2>
            <table>
                <thead>
                    <tr>
                        <th>Thành viên</th>
                        <th>Vai trò</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="assignmentTable">
                    </tbody>
            </table>
        </div>
    </main>

    <main id="assignPage" class="page">
        <div class="card">
            <h2 id="formTitle">Gán vai trò mới</h2>
            <div class="form-group">
                <label>Tên thành viên</label>
                <input type="text" id="memberName" placeholder="Nhập tên thành viên...">
            </div>
            <div class="form-group">
                <label>Vai trò</label>
                <select id="memberRole">
                    <option value="">-- Chọn vai trò --</option>
                    <option value="Trưởng ban">Trưởng ban (Bắt buộc)</option>
                    <option value="Thư ký">Thư ký (Bắt buộc)</option>
                    <option value="Hậu cần">Hậu cần</option>
                    <option value="Truyền thông">Truyền thông</option>
                    <option value="Kỹ thuật">Kỹ thuật</option>
                </select>
            </div>
            <input type="hidden" id="editIndex" value="-1">
            <button class="main" onclick="saveAssignment()">
                <i class="fas fa-save"></i> Lưu phân công
            </button>
            <button onclick="showPage('listPage')" style="margin-top:10px; background:none; border:none; color:#c0395e; cursor:pointer; width:100%;">Hủy bỏ</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <div id="flowerContainer"></div>

    <script>
        // 1. Dữ liệu giả lập ban đầu
        let assignments = [
            { name: "Nguyễn Văn A", role: "Trưởng ban" },
            { name: "Trần Thị B", role: "Thư ký" }
        ];
        let isAdmin = false;

        // 2. Chức năng Menu & Chuyển trang
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('show');
        }

        function showPage(pageId) {
            if (pageId === 'assignPage' && !isAdmin) {
                showToast("Bạn không có quyền truy cập chức năng này!", "error");
                return;
            }
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            toggleMenu();
        }

        // 3. Phân quyền Admin
        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('roleStatus').innerText = isAdmin ? "Admin" : "User";
            showToast(isAdmin ? "Đã chuyển sang chế độ Admin" : "Đã thoát chế độ Admin", "success");
            renderTable();
        }

        // 4. Hiển thị danh sách
        function renderTable() {
            const tbody = document.getElementById('assignmentTable');
            tbody.innerHTML = assignments.map((item, index) => `
                <tr>
                    <td>${item.name}</td>
                    <td><span class="status-tag active" style="font-size:12px">${item.role}</span></td>
                    <td>
                        ${isAdmin ? `
                            <button onclick="editItem(${index})" style="color:#2ecc71; border:none; background:none; cursor:pointer; margin-right:10px;"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${index})" style="color:#e74c3c; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button>
                        ` : '<i class="fas fa-lock" style="color:#ccc"></i>'}
                    </td>
                </tr>
            `).join('');
        }

        // 5. Lưu & Kiểm tra ràng buộc
        function saveAssignment() {
            const name = document.getElementById('memberName').value.trim();
            const role = document.getElementById('memberRole').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!name || !role) {
                showToast("Vui lòng điền đầy đủ thông tin!", "error");
                return;
            }

            // Kiểm tra trùng vai trò (Giả sử mỗi người 1 vai trò, và Trưởng ban/Thư ký là duy nhất)
            const isDuplicate = assignments.some((a, idx) => a.role === role && idx !== editIndex && (role === "Trưởng ban" || role === "Thư ký"));
            if (isDuplicate) {
                showToast(`Vai trò "${role}" đã có người đảm nhiệm!`, "error");
                return;
            }

            if (editIndex > -1) {
                assignments[editIndex] = { name, role };
                showToast("Cập nhật thành công!", "success");
            } else {
                assignments.push({ name, role });
                showToast("Lưu phân công thành công!", "success");
            }

            resetForm();
            renderTable();
            showPage('listPage');
        }

        // 6. Chỉnh sửa & Xóa
        function editItem(index) {
            const item = assignments[index];
            document.getElementById('memberName').value = item.name;
            document.getElementById('memberRole').value = item.role;
            document.getElementById('editIndex').value = index;
            document.getElementById('formTitle').innerText = "Chỉnh sửa vai trò";
            showPage('assignPage');
        }

        function deleteItem(index) {
            const role = assignments[index].role;
            // Kiểm tra vai trò bắt buộc
            if (role === "Trưởng ban" || role === "Thư ký") {
                if (!confirm(`Đây là vai trò bắt buộc. Bạn vẫn muốn xóa chứ?`)) return;
            }
            if (confirm("Xác nhận xóa phân công này?")) {
                assignments.splice(index, 1);
                renderTable();
                showToast("Đã xóa!", "success");
            }
        }

        function resetForm() {
            document.getElementById('memberName').value = "";
            document.getElementById('memberRole').value = "";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('formTitle').innerText = "Gán vai trò mới";
        }

        // 7. Tiện ích (Toast & Flowers)
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function createFlowers() {
            const container = document.getElementById('flowerContainer');
            const icons = ['🌸', '✨', '💕', '🌷'];
            setInterval(() => {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerText = icons[Math.floor(Math.random() * icons.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(flower);
                setTimeout(() => flower.remove(), 5000);
            }, 500);
        }

        // Khởi tạo
        renderTable();
        createFlowers();
    </script>
</body>
</html>
