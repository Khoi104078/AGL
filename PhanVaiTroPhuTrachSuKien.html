<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhiệm vụ Sự kiện</title>
    <link rel="stylesheet" href="giaodien.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <nav class="menu" id="sideMenu">
        <div style="text-align: right; padding: 10px; color: white; cursor: pointer;" onclick="toggleMenu()">
            <i class="fas fa-times"></i>
        </div>
        <button onclick="goHome()"><i class="fas fa-home"></i> Menu chính</button>
        <button onclick="showPage('listPage')"><i class="fas fa-tasks"></i> Xem phân vai</button>
        <button onclick="showPage('assignPage')"><i class="fas fa-user-plus"></i> Gán vai trò</button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.3); margin: 10px 12px;">
        <button onclick="toggleAdmin()"><i class="fas fa-shield-alt"></i> Quyền: <span id="roleStatus">User</span></button>
    </nav>

    <main id="homePage" class="page" style="display: block;">
        <div class="card" style="text-align: center;">
            <div style="font-size: 50px; color: #ff6a88; margin-bottom: 15px;"><i class="fas fa-calendar-check"></i></div>
            <h2>Menu Chính</h2>
            <p style="color: #c0395e; margin-bottom: 25px;">Hệ thống quản lý sự kiện nội bộ</p>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="main" onclick="showPage('listPage')">Xem danh sách phân công</button>
                <button class="main" style="background: white; color: #ff6a88; border: 2px solid #ff6a88;" onclick="showPage('assignPage')">Phân công nhiệm vụ mới</button>
            </div>
        </div>
    </main>

    <main id="listPage" class="page">
        <div class="card" style="max-width: 850px;">
            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                <button onclick="goHome()" style="background:#ffe0ea; border:none; color:#ff6a88; padding:8px 15px; border-radius:10px; cursor:pointer;">
                    <i class="fas fa-arrow-left"></i> Về Menu chính
                </button>
            </div>
            <h2>Phụ trách nhiệm vụ sự kiện</h2>
            <table>
                <thead>
                    <tr>
                        <th>Thành viên</th>
                        <th>Công việc</th>
                        <th>Hạn chót</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="assignmentTable"></tbody>
            </table>
        </div>
    </main>

    <main id="assignPage" class="page">
        <div class="card">
            <div style="margin-bottom: 15px;">
                <button onclick="goHome()" style="background: none; border: 1px solid #ff6a88; color: #ff6a88; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 13px;">
                    <i class="fas fa-home"></i> Quay lại Trang chủ
                </button>
            </div>

            <h2 id="formTitle">Phân chia nhiệm vụ</h2>
            
            <div class="form-group">
                <label>Tên thành viên</label>
                <input type="text" id="memberName" placeholder="Nhập tên người phụ trách...">
            </div>
            <div class="form-group">
                <label>Phụ trách công việc</label>
                <select id="taskWork">
                    <option value="">-- Chọn mảng công việc --</option>
                    <option value="Hậu cần">Hậu cần</option>
                    <option value="Âm thanh - Ánh sáng">Âm thanh - Ánh sáng</option>
                    <option value="Truyền thông">Truyền thông</option>
                    <option value="Nội dung">Nội dung</option>
                </select>
            </div>
            <div class="form-group">
                <label>Hạn hoàn thành</label>
                <input type="date" id="taskDeadline">
            </div>
            <input type="hidden" id="editIndex" value="-1">
            <button class="main" onclick="saveAssignment()">Lưu phân công</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <div id="flowerContainer"></div>

    <script>
        let tasks = [
            { name: "Nguyễn Văn A", work: "Hậu cần", deadline: "2026-04-05" }
        ];
        let isAdmin = false;

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('show');
        }

        // Hàm đưa người dùng về Trang chủ
        function goHome() {
            resetForm();
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('homePage').style.display = 'block';
            if(document.getElementById('sideMenu').classList.contains('show')) toggleMenu();
        }

        function showPage(pageId) {
            if (pageId === 'assignPage' && !isAdmin) {
                showToast("Bạn cần bật quyền Admin để phân chia vai trò!", "error");
                return;
            }
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            if(document.getElementById('sideMenu').classList.contains('show')) toggleMenu();
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('roleStatus').innerText = isAdmin ? "Admin" : "User";
            showToast(isAdmin ? "Đã bật chế độ Admin" : "Đã tắt chế độ Admin", "success");
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('assignmentTable');
            tbody.innerHTML = tasks.map((item, index) => `
                <tr>
                    <td><b>${item.name}</b></td>
                    <td><span class="status-tag active" style="font-size:11px;">${item.work}</span></td>
                    <td>${item.deadline}</td>
                    <td>
                        ${isAdmin ? `
                            <i class="fas fa-edit" onclick="editItem(${index})" style="color:#2ecc71; cursor:pointer; margin-right:10px;"></i>
                            <i class="fas fa-trash-alt" onclick="deleteItem(${index})" style="color:#e74c3c; cursor:pointer;"></i>
                        ` : '<i class="fas fa-lock" style="color:#ddd"></i>'}
                    </td>
                </tr>
            `).join('');
        }

        function saveAssignment() {
            const name = document.getElementById('memberName').value;
            const work = document.getElementById('taskWork').value;
            const deadline = document.getElementById('taskDeadline').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!name || !work || !deadline) {
                showToast("Vui lòng điền đủ thông tin!", "error");
                return;
            }

            if (editIndex > -1) {
                tasks[editIndex] = { name, work, deadline };
                showToast("Cập nhật thành công!", "success");
            } else {
                tasks.push({ name, work, deadline });
                showToast("Đã lưu phân công!", "success");
            }

            renderTable();
            goHome(); // Sau khi lưu xong tự động quay về trang chủ
        }

        function editItem(index) {
            const item = tasks[index];
            document.getElementById('memberName').value = item.name;
            document.getElementById('taskWork').value = item.work;
            document.getElementById('taskDeadline').value = item.deadline;
            document.getElementById('editIndex').value = index;
            document.getElementById('formTitle').innerText = "Chỉnh sửa phân công";
            showPage('assignPage');
        }

        function deleteItem(index) {
            if (confirm("Xác nhận xóa?")) {
                tasks.splice(index, 1);
                renderTable();
                showToast("Đã xóa!", "success");
            }
        }

        function resetForm() {
            document.getElementById('memberName').value = "";
            document.getElementById('taskWork').value = "";
            document.getElementById('taskDeadline').value = "";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('formTitle').innerText = "Phân chia nhiệm vụ";
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function createFlowers() {
            const container = document.getElementById('flowerContainer');
            setInterval(() => {
                const f = document.createElement('div');
                f.className = 'flower';
                f.innerText = '🌸';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(f);
                setTimeout(() => f.remove(), 5000);
            }, 800);
        }

        renderTable();
        createFlowers();
    </script>
</body>
</html>
