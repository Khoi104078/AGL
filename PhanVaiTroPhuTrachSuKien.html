<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhiệm vụ Sự kiện</title>
    <link rel="stylesheet" href="giaodien.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <nav class="menu" id="sideMenu">
        <button onclick="showPage('listPage')"><i class="fas fa-tasks"></i> Xem phân vai</button>
        <button onclick="showPage('assignPage')" id="adminBtn"><i class="fas fa-user-plus"></i> Gán vai trò</button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.3); margin: 10px 12px;">
        <button onclick="toggleAdmin()"><i class="fas fa-shield-alt"></i> Quyền: <span id="roleStatus">User</span></button>
    </nav>

    <main id="listPage" class="page" style="display: block;">
        <div class="card" style="max-width: 850px;">
            <h2><i class="fas fa-clipboard-check"></i> Phụ trách nhiệm vụ sự kiện</h2>
            <table>
                <thead>
                    <tr>
                        <th>Thành viên</th>
                        <th>Phụ trách công việc</th>
                        <th>Hạn hoàn thành</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="assignmentTable">
                    </tbody>
            </table>
        </div>
    </main>

    <main id="assignPage" class="page">
        <div class="card">
            <h2 id="formTitle">Phân công nhiệm vụ</h2>
            <div class="form-group">
                <label>Tên thành viên</label>
                <input type="text" id="memberName" placeholder="Nhập tên người thực hiện...">
            </div>
            
            <div class="form-group">
                <label>Phụ trách công việc</label>
                <select id="taskWork">
                    <option value="">-- Chọn mảng phụ trách --</option>
                    <option value="Hậu cần">Hậu cần (Sắp xếp đồ đạc, trà nước)</option>
                    <option value="Âm thanh - Ánh sáng">Âm thanh - Ánh sáng</option>
                    <option value="Truyền thông">Truyền thông (Viết bài, chụp ảnh)</option>
                    <option value="Nội dung">Nội dung (Kịch bản, MC)</option>
                    <option value="Đối ngoại">Đối ngoại (Mời khách, tài trợ)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Hạn hoàn thành (Deadline)</label>
                <input type="date" id="taskDeadline">
            </div>

            <input type="hidden" id="editIndex" value="-1">
            <button class="main" onclick="saveAssignment()">
                <i class="fas fa-save"></i> Lưu thông tin
            </button>
            <button onclick="showPage('listPage')" style="margin-top:10px; background:none; border:none; color:#c0395e; cursor:pointer; width:100%;">Quay lại danh sách</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <div id="flowerContainer"></div>

    <script>
        // Khởi tạo dữ liệu mẫu
        let tasks = [
            { name: "Nguyễn Văn A", work: "Hậu cần", deadline: "2026-04-05" },
            { name: "Trần Thị B", work: "Nội dung", deadline: "2026-04-01" }
        ];
        let isAdmin = false;

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('show');
        }

        function showPage(pageId) {
            // Kiểm tra quyền nếu vào trang gán vai trò
            if (pageId === 'assignPage' && !isAdmin) {
                showToast("Bạn không có quyền gán vai trò!", "error");
                return;
            }
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            if(document.getElementById('sideMenu').classList.contains('show')) toggleMenu();
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('roleStatus').innerText = isAdmin ? "Admin" : "User";
            showToast(isAdmin ? "Đã mở quyền chỉnh sửa" : "Đã khóa quyền chỉnh sửa", "success");
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('assignmentTable');
            tbody.innerHTML = tasks.map((item, index) => `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td><span class="status-tag active" style="font-size:12px">${item.work}</span></td>
                    <td>${item.deadline}</td>
                    <td>
                        ${isAdmin ? `
                            <button onclick="editItem(${index})" style="color:#2ecc71; border:none; background:none; cursor:pointer; margin-right:10px;"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${index})" style="color:#e74c3c; border:none; background:none; cursor:pointer;"><i class="fas fa-trash-alt"></i></button>
                        ` : '<i class="fas fa-lock" style="color:#ddd"></i>'}
                    </td>
                </tr>
            `).join('');
        }

        function saveAssignment() {
            const name = document.getElementById('memberName').value.trim();
            const work = document.getElementById('taskWork').value;
            const deadline = document.getElementById('taskDeadline').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!name || !work || !deadline) {
                showToast("Vui lòng nhập đủ thông tin và hạn hoàn thành!", "error");
                return;
            }

            // Kiểm tra ràng buộc: Một người không nên phụ trách trùng một mảng công việc đã có
            const isDuplicate = tasks.some((t, idx) => t.work === work && idx !== editIndex);
            if (isDuplicate && (work === "Hậu cần" || work === "Âm thanh - Ánh sáng")) {
                if(!confirm(`Mảng ${work} đã có người phụ trách. Bạn muốn bổ sung thêm người?`)) return;
            }

            const data = { name, work, deadline };

            if (editIndex > -1) {
                tasks[editIndex] = data;
                showToast("Cập nhật nhiệm vụ thành công!", "success");
            } else {
                tasks.push(data);
                showToast("Phân công thành công!", "success");
            }

            resetForm();
            renderTable();
            showPage('listPage');
        }

        function editItem(index) {
            const item = tasks[index];
            document.getElementById('memberName').value = item.name;
            document.getElementById('taskWork').value = item.work;
            document.getElementById('taskDeadline').value = item.deadline;
            document.getElementById('editIndex').value = index;
            document.getElementById('formTitle').innerText = "Chỉnh sửa nhiệm vụ";
            showPage('assignPage');
        }

        function deleteItem(index) {
            if (confirm("Bạn chắc chắn muốn xóa phân công này?")) {
                tasks.splice(index, 1);
                renderTable();
                showToast("Đã xóa nhiệm vụ!", "success");
            }
        }

        function resetForm() {
            document.getElementById('memberName').value = "";
            document.getElementById('taskWork').value = "";
            document.getElementById('taskDeadline').value = "";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('formTitle').innerText = "Phân công nhiệm vụ";
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Hiệu ứng hoa rơi từ CSS cũ
        function createFlowers() {
            const container = document.getElementById('flowerContainer');
            const icons = ['🌸', '✨', '🌷'];
            setInterval(() => {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerText = icons[Math.floor(Math.random() * icons.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(flower);
                setTimeout(() => flower.remove(), 5000);
            }, 600);
        }

        renderTable();
        createFlowers();
    </script>
</body>
</html>
