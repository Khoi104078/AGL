<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Người Tham Gia - CLB</title>
    <style>
        /* Tích hợp CSS từ file giaodien.css */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { 
            background: linear-gradient(135deg, #ff9a9e, #fad0c4); 
            min-height: 100vh; 
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, .97);
            padding: 30px;
            border-radius: 24px;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 16px 48px rgba(255, 105, 180, .2);
        }

        h2 { 
            text-align: center; 
            color: #e84393; 
            margin-bottom: 25px; 
            font-family: 'Quicksand'; 
            font-weight: 700;
        }

        /* Form điều khiển */
        .control-panel {
            background: #fff9fb;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffe0ea;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe0ea;
            border-radius: 12px;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: #ff6a88; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button.main {
            padding: 12px 20px;
            background: linear-gradient(135deg, #ff6a88, #e84393);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button.main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 106, 136, 0.4); }

        /* Bảng dữ liệu */
        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; background: #fff; min-width: 700px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #ffe0ea; }
        th { background: #ffe0ea; color: #c0395e; font-weight: 700; }

        .status-checkin { color: #27ae60; background: #eafaf1; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .status-not { color: #e67e22; background: #fef5e7; padding: 5px 10px; border-radius: 8px; font-weight: bold; }

        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }

        .back-link { 
            display: inline-block; 
            margin-bottom: 15px; 
            color: #c0395e; 
            text-decoration: none; 
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="card">
    <a href="Giaodienquanlysukienclb.html" class="back-link">← Quay lại trang chủ</a>
    <h2>🔍 Quản Lý & Điểm Danh Thành Viên</h2>

    <div class="control-panel">
        <div>
            <label style="font-size: 12px; font-weight: bold; color: #c0395e;">Họ tên</label>
            <input type="text" id="edit_name" placeholder="Họ tên">
        </div>
        <div>
            <label style="font-size: 12px; font-weight: bold; color: #c0395e;">Trạng thái</label>
            <select id="edit_status">
                <option value="Chưa Check-in">Chưa Check-in</option>
                <option value="Đã Check-in">Đã Check-in</option>
            </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="main" style="width: 100%;" onclick="saveChanges()">Lưu Cập Nhật</button>
        </div>
    </div>

    <div class="btn-group">
        <input type="text" id="searchBox" placeholder="Tìm theo tên hoặc MSSV..." oninput="renderTable()" style="flex: 2;">
        <button class="main" style="background: #8e44ad;" onclick="exportCSV()">📥 Xuất CSV</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ Tên</th>
                    <th>MSSV</th>
                    <th>Sự kiện</th>
                    <th>Trạng Thái</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'participants'; // Đồng bộ với file chính
    let participants = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentEditIdx = -1;

    function renderTable() {
        const tbody = document.getElementById('memberTableBody');
        const keyword = document.getElementById('searchBox').value.toLowerCase();
        
        const filtered = participants.filter(p => 
            (p.name || p.hoTen || "").toLowerCase().includes(keyword) || 
            (p.mssv || "").toLowerCase().includes(keyword)
        );

        tbody.innerHTML = filtered.map((p, index) => {
            const realIdx = participants.findIndex(item => item.mssv === p.mssv && item.event === p.event);
            const statusStyle = p.status === 'Đã Check-in' ? 'status-checkin' : 'status-not';
            return `
                <tr>
                    <td>${index + 1}</td>
                    <td>${p.name || p.hoTen}</td>
                    <td>${p.mssv}</td>
                    <td><small>${p.event}</small></td>
                    <td><span class="${statusStyle}">${p.status || 'Chưa Check-in'}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editMode(${realIdx})">Sửa</button>
                        <button class="btn-del" onclick="deleteUser(${realIdx})">Xóa</button>
                    </td>
                </tr>`;
        }).join('');
    }

    function editMode(idx) {
        currentEditIdx = idx;
        const p = participants[idx];
        document.getElementById('edit_name').value = p.name || p.hoTen;
        document.getElementById('edit_status').value = p.status || 'Chưa Check-in';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveChanges() {
        if (currentEditIdx === -1) return alert("Vui lòng chọn một người để sửa!");
        
        participants[currentEditIdx].name = document.getElementById('edit_name').value;
        participants[currentEditIdx].status = document.getElementById('edit_status').value;
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(participants));
        alert("Đã cập nhật thành công!");
        currentEditIdx = -1;
        renderTable();
    }

    function deleteUser(idx) {
        if (confirm("Xóa thành viên này khỏi danh sách?")) {
            participants.splice(idx, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(participants));
            renderTable();
        }
    }

    function exportCSV() {
        if (participants.length === 0) return alert("Không có dữ liệu!");
        let csv = "\uFEFFSTT,Họ Tên,MSSV,Sự kiện,Trạng Thái\n";
        participants.forEach((p, i) => {
            csv += `${i+1},"${p.name || p.hoTen}","${p.mssv}","${p.event}","${p.status || 'Chưa Check-in'}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "danh_sach_clb_chi_tiet.csv";
        link.click();
    }

    window.onload = renderTable;
</script>
</body>
</html>
