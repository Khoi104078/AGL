<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lịch sử tham gia sự kiện</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Nunito',sans-serif; }
  body { background: linear-gradient(135deg,#ff9a9e,#fad0c4); min-height:100vh; padding:40px 20px; }
  h2 { text-align:center; color:#e84393; margin-bottom:20px; font-family:'Quicksand'; }
  .card { background:rgba(255,255,255,.97); padding:30px; border-radius:24px; max-width:800px; margin:0 auto 30px; box-shadow:0 16px 48px rgba(255,105,180,.2); }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:12px; text-align:center; border-bottom:1px solid #eee; }
  th { background:#ffe0ea; color:#c0395e; }
  .btn-edit { background:#ff9f43; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; margin:2px; }
  .btn-del { background:#ff4757; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; margin:2px; }
  .btn-ok { background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; margin:2px; }
  .back { display:inline-block; margin-bottom:20px; color:#e84393; cursor:pointer; font-weight:700; }
  .back:hover { text-decoration:underline; }
  .flower { position:fixed; top:-50px; font-size:20px; animation:fall linear infinite; pointer-events:none; }
  @keyframes fall { to { transform:translateY(110vh); } }
  .toast { position:fixed; bottom:25px; left:50%; transform:translateX(-50%) translateY(100px); padding:12px 25px; border-radius:12px; color:#fff; font-weight:700; transition:0.4s; z-index:9999; opacity:0; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { background:#2ecc71; }
  .toast.error { background:#e74c3c; }
</style>
</head>
<body>

<div style="max-width:800px; margin:0 auto;">
  <p class="back" onclick="window.location.href='Giaodienquanlysukienclb.html'">← Quay về trang chủ</p>

  <div class="card">
    <h2>📋 Danh sách đăng ký</h2>
    <table>
      <thead>
        <tr><th>Họ tên</th><th>MSSV</th><th>Sự kiện</th><th>Trạng thái</th><th>Hành động</th></tr>
      </thead>
      <tbody id="ds"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>📜 Lịch sử tham gia</h2>
    <table>
      <thead>
        <tr><th>Họ tên</th><th>Sự kiện</th><th>Trạng thái</th><th>Chi tiết</th></tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { db, ref, onValue, update } from "./firebase.js";

let participants = [];

onValue(ref(db, "participants"), snapshot => {
  participants = [];
  snapshot.forEach(child => participants.push({ id: child.key, ...child.val() }));
  hienThi();
});

function hienThi() {
  // Danh sách đăng ký
  document.getElementById("ds").innerHTML = participants.map(p => `
    <tr>
      <td>${p.name}</td>
      <td>${p.mssv || ""}</td>
      <td>${p.event}</td>
      <td>${p.trangthai || "Đã đăng ký"}</td>
      <td>
        <button class="btn-ok" onclick="capNhat('${p.id}','Đã tham gia')">✔ Tham gia</button>
        <button class="btn-edit" onclick="capNhat('${p.id}','Vắng mặt')">❌ Vắng</button>
        <button class="btn-del" onclick="capNhat('${p.id}','Đã hủy')">🚫 Hủy</button>
      </td>
    </tr>`).join("");

  // Lịch sử
  document.getElementById("history").innerHTML = participants.map(p => `
    <tr>
      <td>${p.name}</td>
      <td>${p.event}</td>
      <td>${p.trangthai || "Đã đăng ký"}</td>
      <td><button class="btn-edit" onclick="chiTiet('${p.name}','${p.event}','${p.trangthai||'Đã đăng ký'}')">Xem</button></td>
    </tr>`).join("");
}

window.capNhat = function(id, tt) {
  update(ref(db, "participants/" + id), { trangthai: tt });
  showToast("✅ Cập nhật thành công!");
}

window.chiTiet = function(hoten, sukien, tt) {
  alert(`👤 ${hoten}\n📌 ${sukien}\n📊 Trạng thái: ${tt}`);
}

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.innerText = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
