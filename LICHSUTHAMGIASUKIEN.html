<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử tham gia sự kiện - CLB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif;}
  body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;}

  /* ── HEADER ── */
  .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(255,106,136,.95);backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(255,106,136,.3);}
  .back-btn{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:20px;cursor:pointer;border-radius:10px;padding:6px 12px;}
  .back-btn:hover{background:rgba(255,255,255,.4);}
  .header-title{color:#fff;font-family:'Quicksand',sans-serif;font-weight:700;font-size:18px;}
  .role-badge{margin-left:auto;background:rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}

  /* ── CONTENT ── */
  .content{padding:90px 20px 40px;max-width:900px;margin:0 auto;}
  .card{background:rgba(255,255,255,.97);border-radius:24px;padding:28px;margin-bottom:20px;box-shadow:0 12px 36px rgba(255,105,180,.18);}
  h2{color:#e84393;font-family:'Quicksand';font-size:20px;margin-bottom:6px;}
  .card-sub{color:#aaa;font-size:13px;margin-bottom:20px;}

  /* ── FILTER BAR ── */
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .filter-bar input,.filter-bar select{flex:1;min-width:140px;padding:9px 14px;border:2px solid #ffe0ea;border-radius:12px;background:#fff9fb;outline:none;font-size:13px;}
  .btn-search{padding:9px 18px;background:linear-gradient(135deg,#ff6a88,#e84393);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;}
  .btn-export{padding:9px 18px;background:#8e44ad;color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;}

  /* ── TABLE ── */
  .table-wrap{overflow-x:auto;border-radius:14px;border:1.5px solid #ffe0ea;}
  table{width:100%;border-collapse:collapse;min-width:500px;}
  th{background:#ffe0ea;color:#c0395e;padding:13px 14px;text-align:center;font-weight:700;font-size:13px;}
  td{padding:13px 14px;text-align:center;border-bottom:1px solid #fef0f5;font-size:13px;color:#444;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#fffafb;}

  /* ── STATUS BADGES ── */
  .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge-joined{background:#d4f8e8;color:#27ae60;}
  .badge-absent{background:#fde8e8;color:#e74c3c;}
  .badge-cancel{background:#f0f0f0;color:#888;}
  .badge-registered{background:#fef3e0;color:#e67e22;}

  /* ── ADMIN ACTION BUTTONS ── */
  .btn-ok{background:#2ecc71;color:#fff;border:none;padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;margin:2px;}
  .btn-warn{background:#ff9f43;color:#fff;border:none;padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;margin:2px;}
  .btn-del{background:#ff4757;color:#fff;border:none;padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;margin:2px;}

  /* ── STATS ── */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
  .stat-box{background:#fff9fb;border:2px solid #ffe0ea;border-radius:16px;padding:16px;text-align:center;}
  .stat-num{font-size:28px;font-weight:700;color:#e84393;font-family:'Quicksand';}
  .stat-lbl{font-size:11px;color:#aaa;font-weight:600;margin-top:3px;}

  /* ── EMPTY ── */
  .empty-state{text-align:center;padding:40px 20px;color:#bbb;}
  .empty-state .icon{font-size:48px;margin-bottom:12px;}

  /* ── LOADING ── */
  #loadingOverlay{position:fixed;inset:0;background:rgba(255,154,158,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Quicksand';gap:14px;}
  #loadingOverlay.hidden{display:none;}
  .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 25px;border-radius:12px;color:#fff;font-weight:700;transition:.4s;z-index:10001;opacity:0;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.success{background:#2ecc71;}
  .toast.error{background:#e74c3c;}
  .toast.info{background:#3498db;}

  /* ── FLOWER ── */
  .flower{position:fixed;top:-50px;font-size:20px;animation:fall linear infinite;pointer-events:none;}
  @keyframes fall{0%{transform:translateY(-50px) rotate(0)}100%{transform:translateY(110vh) rotate(360deg)}}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:#fff;font-size:16px;font-weight:700;">⏳ Đang kết nối dữ liệu...</p>
</div>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="window.location.href='Giaodienquanlysukienclb.html'">←</button>
  <div class="header-title">📜 Lịch sử tham gia sự kiện</div>
  <div class="role-badge" id="roleBadge">Đang tải...</div>
</div>

<!-- NỘI DUNG -->
<div class="content">

  <!-- THỐNG KÊ NHANH -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Tổng đăng ký</div></div>
    <div class="stat-box"><div class="stat-num" id="statJoined" style="color:#27ae60;">0</div><div class="stat-lbl">Đã tham gia</div></div>
    <div class="stat-box"><div class="stat-num" id="statAbsent" style="color:#e74c3c;">0</div><div class="stat-lbl">Vắng mặt</div></div>
    <div class="stat-box"><div class="stat-num" id="statCancelled" style="color:#888;">0</div><div class="stat-lbl">Đã hủy</div></div>
  </div>

  <!-- DANH SÁCH ĐĂNG KÝ -->
  <div class="card">
    <h2 id="listTitle">📋 Danh sách tham gia</h2>
    <div class="card-sub" id="listSub">Lịch sử đăng ký và tham gia các sự kiện CLB</div>

    <!-- BỘ LỌC -->
    <div class="filter-bar">
      <input type="text" id="searchKw" placeholder="🔍 Tìm kiếm tên, sự kiện..." oninput="renderTable()">
      <select id="filterStatus" onchange="renderTable()">
        <option value="">-- Tất cả trạng thái --</option>
        <option value="Đã tham gia">✅ Đã tham gia</option>
        <option value="Vắng mặt">❌ Vắng mặt</option>
        <option value="Đã hủy">🚫 Đã hủy</option>
        <option value="Đã đăng ký">📝 Đã đăng ký</option>
      </select>
      <!-- Xuất CSV chỉ hiển thị cho admin -->
      <button class="btn-export" id="exportBtn" style="display:none;" onclick="exportCSV()">📥 Xuất CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="ds"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { FS } from "./firebase-sync.js";

// Hoa rơi
setInterval(() => {
  const f = document.createElement("div");
  f.className = "flower"; f.innerHTML = "🌸";
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 8000);
}, 400);

// ── Lấy user hiện tại ──────────────────────────────
let currentUser = null;
try { currentUser = JSON.parse(localStorage.getItem("currentUser") || "null"); } catch {}

const isAdmin = currentUser?.role === "admin";

// ── Chờ Firebase ───────────────────────────────────
await FS.ready;
document.getElementById("loadingOverlay").classList.add("hidden");

// ── Cập nhật UI theo role ──────────────────────────
document.getElementById("roleBadge").textContent =
  isAdmin ? "👑 Quản trị viên" :
  currentUser ? `👤 ${currentUser.name || currentUser.email}` : "Khách";

if (isAdmin) {
  document.getElementById("listTitle").textContent   = "📋 Danh sách đăng ký toàn bộ";
  document.getElementById("listSub").textContent     = "Quản lý tất cả đăng ký và trạng thái tham gia";
  document.getElementById("exportBtn").style.display = "inline-block";
}

// ── Re-render khi có thay đổi ──────────────────────
window.addEventListener("fs:participants", () => { renderStats(); renderTable(); });

renderStats();
renderTable();

// ── Lọc dữ liệu theo role ─────────────────────────
function getFilteredData() {
  let list = FS.getParticipants();

  // USER chỉ thấy đăng ký của chính mình (so email và mssv)
  if (!isAdmin && currentUser) {
    list = list.filter(p =>
      (p.email && p.email.toLowerCase() === (currentUser.email || "").toLowerCase()) ||
      (p.mssv  && p.mssv  === currentUser.mssv)
    );
  }

  // Áp dụng bộ lọc
  const kw     = (document.getElementById("searchKw")?.value || "").toLowerCase();
  const status = document.getElementById("filterStatus")?.value || "";

  return list.filter(p => {
    const matchKw = !kw ||
      (p.name  || "").toLowerCase().includes(kw) ||
      (p.event || "").toLowerCase().includes(kw) ||
      (p.mssv  || "").toLowerCase().includes(kw);
    const tt = p.trangthai || (p.status === "cancelled" ? "Đã hủy" : "Đã đăng ký");
    const matchStatus = !status || tt === status;
    return matchKw && matchStatus;
  });
}

// ── Thống kê nhanh ────────────────────────────────
function renderStats() {
  let base = FS.getParticipants();
  if (!isAdmin && currentUser) {
    base = base.filter(p =>
      (p.email && p.email.toLowerCase() === (currentUser.email || "").toLowerCase()) ||
      (p.mssv  && p.mssv  === currentUser.mssv)
    );
  }
  document.getElementById("statTotal").textContent     = base.length;
  document.getElementById("statJoined").textContent    = base.filter(p => p.trangthai === "Đã tham gia" || p.checkedIn).length;
  document.getElementById("statAbsent").textContent    = base.filter(p => p.trangthai === "Vắng mặt").length;
  document.getElementById("statCancelled").textContent = base.filter(p => p.trangthai === "Đã hủy" || p.status === "cancelled").length;
}

// ── Render bảng ───────────────────────────────────
function renderTable() {
  const list   = getFilteredData();
  const head   = document.getElementById("tableHead");
  const tbody  = document.getElementById("ds");

  // Header columns
  if (isAdmin) {
    head.innerHTML = `<tr><th>Họ tên</th><th>MSSV</th><th>Email</th><th>Sự kiện</th><th>Ngày ĐK</th><th>Trạng thái</th><th>Cập nhật</th></tr>`;
  } else {
    head.innerHTML = `<tr><th>Sự kiện</th><th>Ngày diễn ra</th><th>Ngày đăng ký</th><th>Trạng thái</th></tr>`;
  }

  if (!list.length) {
    const colspan = isAdmin ? 7 : 4;
    tbody.innerHTML = `<tr><td colspan="${colspan}">
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>${currentUser ? "Bạn chưa đăng ký sự kiện nào." : "Không có dữ liệu."}</p>
      </div>
    </td></tr>`;
    return;
  }

  const events = FS.getEvents();

  tbody.innerHTML = list.map(p => {
    const tt    = p.trangthai || (p.status === "cancelled" ? "Đã hủy" : "Đã đăng ký");
    const badge = getBadge(tt, p.checkedIn);
    const ev    = events.find(e => e.t === p.event);
    const evDate = ev ? `${ev.d || ""} ${ev.time || ""}`.trim() : "—";
    const regDate = p.registeredAt ? new Date(p.registeredAt).toLocaleDateString("vi-VN") : "—";

    if (isAdmin) {
      // Admin: xem đầy đủ + có nút hành động
      return `<tr>
        <td style="font-weight:600;">${p.name || "—"}</td>
        <td><code>${p.mssv || "—"}</code></td>
        <td style="font-size:12px;">${p.email || "—"}</td>
        <td>${p.event || "—"}</td>
        <td style="font-size:12px;">${regDate}</td>
        <td>${badge}</td>
        <td style="white-space:nowrap;">
          <button class="btn-ok"   onclick="capNhat('${p.id}','Đã tham gia')">✔ Tham gia</button>
          <button class="btn-warn" onclick="capNhat('${p.id}','Vắng mặt')">❌ Vắng</button>
          <button class="btn-del"  onclick="capNhat('${p.id}','Đã hủy')">🚫 Hủy</button>
        </td>
      </tr>`;
    } else {
      // User: chỉ xem, không có hành động
      return `<tr>
        <td style="font-weight:600;text-align:left;">${p.event || "—"}</td>
        <td>${evDate}</td>
        <td>${regDate}</td>
        <td>${badge}</td>
      </tr>`;
    }
  }).join("");
}
window.renderTable = renderTable;

// ── Badge helper ──────────────────────────────────
function getBadge(tt, checkedIn) {
  if (tt === "Đã tham gia" || checkedIn)
    return `<span class="badge badge-joined">✅ Đã tham gia</span>`;
  if (tt === "Vắng mặt")
    return `<span class="badge badge-absent">❌ Vắng mặt</span>`;
  if (tt === "Đã hủy")
    return `<span class="badge badge-cancel">🚫 Đã hủy</span>`;
  return `<span class="badge badge-registered">📝 Đã đăng ký</span>`;
}

// ── Cập nhật trạng thái (admin only) ──────────────
window.capNhat = async function(id, tt) {
  if (!isAdmin) return;
  try {
    await FS.updateParticipant(id, { trangthai: tt });
    showToast("✅ Cập nhật thành công!", "success");
  } catch(e) {
    showToast("❌ Lỗi: " + e.message, "error");
  }
};

// ── Xuất CSV (admin only) ─────────────────────────
window.exportCSV = function() {
  if (!isAdmin) return;
  const list = FS.getParticipants();
  if (!list.length) return showToast("Không có dữ liệu!", "error");
  let csv = "\uFEFFHọ tên;MSSV;Email;Sự kiện;Ngày ĐK;Trạng thái\n";
  list.forEach(p => {
    const tt  = p.trangthai || (p.status === "cancelled" ? "Đã hủy" : "Đã đăng ký");
    const reg = p.registeredAt ? new Date(p.registeredAt).toLocaleDateString("vi-VN") : "";
    csv += `"${p.name||""}";"${p.mssv||""}";"${p.email||""}";"${p.event||""}";"${reg}";"${tt}"\n`;
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type:"text/csv" }));
  a.download = "lichsu_thamgia.csv";
  a.click();
  showToast("📥 Xuất CSV thành công!");
};

// ── Toast ─────────────────────────────────────────
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
